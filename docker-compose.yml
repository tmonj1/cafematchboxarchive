services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    ports:
      - "8001:8000"
    command: "-jar DynamoDBLocal.jar -inMemory -sharedDb"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000/ | grep -q 'dynamodb' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  dynamodb-setup:
    image: amazon/aws-cli:latest
    environment:
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_DEFAULT_REGION: ap-northeast-1
    depends_on:
      dynamodb:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        aws dynamodb create-table \
          --table-name users \
          --attribute-definitions \
            AttributeName=userId,AttributeType=S \
            AttributeName=username,AttributeType=S \
            AttributeName=email,AttributeType=S \
          --key-schema AttributeName=userId,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --global-secondary-indexes '[
            {
              "IndexName": "username-index",
              "KeySchema": [{"AttributeName": "username", "KeyType": "HASH"}],
              "Projection": {"ProjectionType": "ALL"}
            },
            {
              "IndexName": "email-index",
              "KeySchema": [{"AttributeName": "email", "KeyType": "HASH"}],
              "Projection": {"ProjectionType": "ALL"}
            }
          ]' \
          --endpoint-url http://dynamodb:8000 2>/dev/null || echo "users table already exists"

        aws dynamodb create-table \
          --table-name matchboxes \
          --attribute-definitions \
            AttributeName=matchboxId,AttributeType=S \
            AttributeName=userId,AttributeType=S \
          --key-schema AttributeName=matchboxId,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --global-secondary-indexes '[
            {
              "IndexName": "userId-index",
              "KeySchema": [{"AttributeName": "userId", "KeyType": "HASH"}],
              "Projection": {"ProjectionType": "ALL"}
            }
          ]' \
          --endpoint-url http://dynamodb:8000 2>/dev/null || echo "matchboxes table already exists"

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb local/${S3_BUCKET:-cafematchbox-images} 2>/dev/null || echo "bucket already exists"
        mc anonymous set download local/${S3_BUCKET:-cafematchbox-images}

  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      dynamodb-setup:
        condition: service_completed_successfully
      minio-setup:
        condition: service_completed_successfully
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  minio_data:
